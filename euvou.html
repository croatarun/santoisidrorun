<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Santo Isidro Run 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2d5a27;
            --dark: #1a1a1a;
            --bg: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }

        .card { 
            background: white; padding: 24px; border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            max-width: 450px; width: 100%; 
        }

        h2 { text-align: center; color: var(--dark); font-size: 1.2rem; margin-bottom: 20px; }

        .preview-container { 
            width: 100%; border-radius: 16px; overflow: hidden; 
            background: #e0e0e0; position: relative; margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        canvas { width: 100%; display: block; cursor: move; }

        .controls-grid { 
            display: grid; gap: 15px; background: #fdfdfd; 
            padding: 20px; border-radius: 16px; border: 1px solid #eee;
        }

        .control-group label { 
            display: flex; justify-content: space-between;
            font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase;
        }

        input[type="range"] { 
            width: 100%; height: 6px; border-radius: 5px; appearance: none; background: #eee; 
        }

        input[type="range"]::-webkit-slider-thumb { 
            appearance: none; width: 18px; height: 18px; background: var(--primary); border-radius: 50%; cursor: pointer;
        }

        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }

        .btn { 
            flex: 1; padding: 14px; border-radius: 12px; border: none; 
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-upload { background: var(--dark); color: white; }
        .btn-upload:hover { background: #333; }

        .btn-download { background: var(--primary); color: white; }
        .btn-download:hover { opacity: 0.9; transform: translateY(-2px); }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2><i class="fas fa-running"></i> Gerador de Stories</h2>

    <div class="preview-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls-grid">
        <div class="control-group">
            <label>Zoom <span id="val-zoom">1.2x</span></label>
            <input type="range" id="zoom" min="0.1" max="4" step="0.01" value="1.2">
        </div>
        <div class="control-group">
            <label>Posição Horizontal <span id="val-x">0</span></label>
            <input type="range" id="posX" min="-1000" max="1000" value="0">
        </div>
        <div class="control-group">
            <label>Posição Vertical <span id="val-y">0</span></label>
            <input type="range" id="posY" min="-1000" max="1000" value="0">
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-camera"></i> Foto
        </button>
        <button class="btn btn-download" id="downloadBtn">
            <i class="fas fa-download"></i> Baixar
        </button>
    </div>

    <input type="file" id="fileInput" accept="image/*">
</div>

<script>
    const config = {
        width: 1080,
        height: 1920,
        area: { x: 124, y: 231, w: 832, h: 1046, r: 105 }
    };

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const imgFrame = new Image();
    const imgUser = new Image();

    let isUserImgLoaded = false;

    // Inicialização
    canvas.width = config.width;
    canvas.height = config.height;
    imgFrame.src = 'euvou.png'; // Garanta que o arquivo exista

    imgFrame.onload = render;

    document.getElementById('fileInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = event => {
            imgUser.onload = () => {
                isUserImgLoaded = true;
                autoFitImage();
                render();
            };
            imgUser.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function autoFitImage() {
        // Lógica simples para centralizar automaticamente ao carregar
        document.getElementById('posX').value = 0;
        document.getElementById('posY').value = 0;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (isUserImgLoaded) {
            ctx.save();
            // Criar Máscara Arredondada
            drawRoundedRect(ctx, config.area.x, config.area.y, config.area.w, config.area.h, config.area.r);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            // Atualiza labels numéricas
            document.getElementById('val-zoom').innerText = zoom.toFixed(1) + 'x';

            const drawW = imgUser.width * zoom;
            const drawH = imgUser.height * zoom;
            const centerX = config.area.x + (config.area.w / 2) + px;
            const centerY = config.area.y + (config.area.h / 2) + py;

            ctx.drawImage(imgUser, centerX - drawW/2, centerY - drawH/2, drawW, drawH);
            ctx.restore();
        }

        // Desenha a moldura por cima (Se a moldura tiver transparência no meio)
        // Se a moldura NÃO tiver transparência, use 'destination-over' como você fez
        ctx.drawImage(imgFrame, 0, 0, canvas.width, canvas.height);
    }

    function drawRoundedRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    // Eventos de Input
    document.querySelectorAll('input[type=range]').forEach(input => {
        input.addEventListener('input', render);
    });

    // Download
    document.getElementById('downloadBtn').onclick = () => {
        if(!isUserImgLoaded) return alert("Adicione sua foto primeiro!");
        
        const link = document.createElement('a');
        link.download = `santo-isidro-run-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>
</body>
</html>
